[General]
network = MetsrVeinsBridgeNetwork
sim-time-limit = 7d
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 30s

*.bridge.bridgeHost = "0.0.0.0"
*.bridge.bridgePort = 9099
*.bridge.baseLatencyMs = 8
*.bridge.perMessageLatencyMs = 0.35
*.bridge.perPayloadByteLatencyUs = 0.04
*.bridge.contentionLossSlope = 0.0002
*.bridge.bitrateMbps = 6
*.bridge.macSlotTimeMs = 0.013
*.bridge.maxJitterMs = 0.25
*.bridge.communicationRangeM = 1000
*.bridge.distanceLatencyUsPerM = 2
*.bridge.distanceLossAtRange = 0.05
*.bridge.pollIntervalMs = 10
*.bridge.bridgeBackend = "abstract_omnetpp"
*.bridge.backendImplementation = "abstract_event_profile"
*.bridge.networkModel = "omnetpp_event_wireless_queue_model"
*.bridge.backendNote = "Default lightweight OMNeT++ event-scheduled queue/contention model."
*.bridge.radioAccess = "cv2x"
*.bridge.logRequests = true

[Config AbstractOmnetpp]
description = "Default abstract OMNeT++ event-scheduled queue/contention model."
*.bridge.bridgeBackend = "abstract_omnetpp"
*.bridge.backendImplementation = "abstract_event_profile"
*.bridge.networkModel = "omnetpp_event_wireless_queue_model"
*.bridge.backendNote = "Default lightweight OMNeT++ event-scheduled queue/contention model."
*.bridge.radioAccess = "cv2x"

[Config Veins80211p]
description = "802.11p-like profile using the current abstract event model; not a full Veins PHY/MAC stack yet."
*.bridge.bridgeBackend = "veins_80211p"
*.bridge.backendImplementation = "abstract_profile_pending_full_veins"
*.bridge.networkModel = "omnetpp_event_wireless_queue_model"
*.bridge.backendNote = "Parameter profile inspired by a Veins/VASP-style 802.11p setup; replace with real Veins NIC/channel modules for PHY/MAC fidelity."
*.bridge.radioAccess = "802.11p"
*.bridge.baseLatencyMs = 3
*.bridge.perMessageLatencyMs = 0.2
*.bridge.perPayloadByteLatencyUs = 0.02
*.bridge.contentionLossSlope = 0.0006
*.bridge.bitrateMbps = 6
*.bridge.macSlotTimeMs = 0.013
*.bridge.maxJitterMs = 0.5
*.bridge.communicationRangeM = 1000
*.bridge.distanceLatencyUsPerM = 0.5
*.bridge.distanceLossAtRange = 0.18

[Config Sim5gCellular]
description = "Simu5G-oriented cellular profile using the current abstract event model; not a full Simu5G integration yet."
*.bridge.bridgeBackend = "sim5g_cellular"
*.bridge.backendImplementation = "abstract_profile_pending_simu5g"
*.bridge.networkModel = "omnetpp_event_wireless_queue_model"
*.bridge.backendNote = "Parameter profile for a future Simu5G cellular bridge; current implementation does not instantiate Simu5G gNB/UE/UPF modules."
*.bridge.radioAccess = "5g_nr_cellular"
*.bridge.baseLatencyMs = 18
*.bridge.perMessageLatencyMs = 0.08
*.bridge.perPayloadByteLatencyUs = 0.01
*.bridge.contentionLossSlope = 0.00008
*.bridge.bitrateMbps = 50
*.bridge.macSlotTimeMs = 0.125
*.bridge.maxJitterMs = 2
*.bridge.communicationRangeM = 5000
*.bridge.distanceLatencyUsPerM = 0.1
*.bridge.distanceLossAtRange = 0.03
